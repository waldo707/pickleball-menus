<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  padding: 20px;
  background: #f4f4f4;
}

h1, h2, h3 { text-align: center; }

label {
  display: block;
  margin-top: 12px;
  font-weight: 600;
}

textarea,input,button {
  font-size: 18px;
  padding: 10px;
  width: 100%;
  margin-top: 6px;
}

button {
  background: #007acc;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 14px;
}

.secondary { background:#666; }

/* Timer */
.timer {
  font-size: 64px;
  font-weight: 800;
  text-align: center;
  margin: 20px 0;
}
.timer-running {
  font-size: 72px;
  font-weight: 900;
  text-align: center;
  margin: 26px 0;
}
@media (max-width:420px){
  .timer{font-size:52px;}
  .timer-running{font-size:64px;}
}

/* Matches */
.matchup {
  margin: 22px 0;
  text-align: center;
}
.court-label {
  font-size: 18px;
  font-weight: 700;
}
.team {
  font-size: 22px;
  font-weight: 600;
}
.vs {
  font-size: 18px;
  opacity:0.7;
  margin:6px 0;
}
</style>
</head>

<body>

<div id="menuView">
  <h1>Pickleball Scheduler</h1>

  <label>Players</label>
  <textarea id="playersInput" rows="3"></textarea>

  <label>Courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

  <button onclick="start()">Generate Schedule</button>
</div>

<div id="roundView" style="display:none;">
  <h2 id="roundHeading">Current Round</h2>
  <div id="currentRoundNames"></div>

  <div id="timerDisplay" class="timer">00:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="togglePause()">Pause / Resume</button>
  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<div id="runningView" style="display:none;">
  <div id="timerDisplayRunning" class="timer-running">00:00</div>
  <button onclick="togglePause()">Pause / Resume</button>

  <h3>Next Round</h3>
  <div id="nextRoundNames"></div>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<script>
/* ===================== STATE ===================== */

let players=[], courts=1;
let playCount={}, sitoutStreak={}, partnerCount={};
let currentRound=null, nextRoundData=null;
let roundState="idle";

/* Timer */
let timerMinutes=8, timerSeconds=0, timerRunning=false, timerInterval=null;

/* ===================== VIEW ===================== */

function setView(v){
  menuView.style.display=v==="menu"?"block":"none";
  roundView.style.display=v==="round"?"block":"none";
  runningView.style.display=v==="running"?"block":"none";
}

/* ===================== AUDIO ===================== */

let audioCtx=null;
function unlockAudio(){
  if(!audioCtx){
    const Ctx=window.AudioContext||window.webkitAudioContext;
    audioCtx=new Ctx();
  }
  if(audioCtx.state==="suspended") audioCtx.resume();
}
function playAlarm(){
  unlockAudio();
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=880;
  g.gain.value=0.5;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+1.2);
}

/* ===================== TIMER ===================== */

function updateTimer(){
  const m=String(Math.floor(timerSeconds/60)).padStart(2,"0");
  const s=String(timerSeconds%60).padStart(2,"0");
  timerDisplay.textContent=m+":"+s;
  timerDisplayRunning.textContent=m+":"+s;
}

function startTimer(){
  if(timerRunning) return;

  if(roundState==="finished"){
    currentRound=nextRoundData;
    nextRoundData=generateRound();
  }

  unlockAudio();
  roundState="running";
  timerRunning=true;
  setView("running");

  timerInterval=setInterval(()=>{
    timerSeconds--;
    updateTimer();
    if(timerSeconds<=0){
      playAlarm();
      endRound();
    }
  },1000);
}

function endRound(){
  clearInterval(timerInterval);
  timerRunning=false;
  roundState="finished";
  timerSeconds=timerMinutes*60;
  render();
  setView("round");
}

function togglePause(){
  if(!timerRunning && timerSeconds>0){ startTimer(); return; }
  clearInterval(timerInterval);
  timerRunning=false;
}

/* ===================== FAIRNESS SCHEDULER ===================== */

function generateRound(){
  const slots=courts*4;

  players.forEach(p=>{
    playCount[p] ??= 0;
    sitoutStreak[p] ??= 0;
    partnerCount[p] ??= {};
  });

  const sorted=[...players].sort((a,b)=>{
    if(playCount[a]!==playCount[b]) return playCount[a]-playCount[b];
    return sitoutStreak[b]-sitoutStreak[a];
  });

  let playing=sorted.slice(0,slots);
  let sitting=sorted.slice(slots);

  playing.forEach(p=>sitoutStreak[p]=0);
  sitting.forEach(p=>sitoutStreak[p]++);

  let matches=[];
  let pool=[...playing];

  while(pool.length>=4){
    let best=null, bestScore=Infinity;
    for(let i=0;i<pool.length;i++){
      for(let j=i+1;j<pool.length;j++){
        for(let k=0;k<pool.length;k++){
          for(let l=k+1;l<pool.length;l++){
            if(new Set([i,j,k,l]).size<4) continue;
            const a=pool[i], b=pool[j], c=pool[k], d=pool[l];
            const score=(partnerCount[a][b]||0)+(partnerCount[c][d]||0);
            if(score<bestScore){
              bestScore=score;
              best=[a,b,c,d];
            }
          }
        }
      }
    }
    const [a,b,c,d]=best;
    matches.push({teamA:[a,b],teamB:[c,d]});
    partnerCount[a][b]=(partnerCount[a][b]||0)+1;
    partnerCount[b][a]=(partnerCount[b][a]||0)+1;
    partnerCount[c][d]=(partnerCount[c][d]||0)+1;
    partnerCount[d][c]=(partnerCount[d][c]||0)+1;
    playCount[a]++; playCount[b]++;
    playCount[c]++; playCount[d]++;
    pool=pool.filter(p=>![a,b,c,d].includes(p));
  }
  return {matches};
}

/* ===================== FLOW ===================== */

function start(){
  players=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  courts=parseInt(courtsInput.value,10)||1;
  timerMinutes=parseInt(timerMinutesInput.value,10)||8;

  playCount={}; sitoutStreak={}; partnerCount={};
  timerSeconds=timerMinutes*60;
  roundState="idle";

  currentRound=generateRound();
  nextRoundData=generateRound();
  render();
  setView("round");
}

function nextRound(){
  currentRound=nextRoundData;
  nextRoundData=generateRound();
  timerSeconds=timerMinutes*60;
  roundState="idle";
  render();
  setView("round");
}

function goToMenu(){
  clearInterval(timerInterval);
  timerRunning=false;
  setView("menu");
}

/* ===================== RENDER ===================== */

function render(){
  roundHeading.textContent=roundState==="finished"?"Up Now":"Current Round";

  currentRoundNames.innerHTML=currentRound.matches.map((m,i)=>`
    <div class="matchup">
      <div class="court-label">Court ${i+1}</div>
      <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
      <div class="vs">vs</div>
      <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
    </div>`).join("");

  nextRoundNames.innerHTML=nextRoundData.matches.map((m,i)=>`
    <div class="matchup">
      <div class="court-label">Court ${i+1}</div>
      <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
      <div class="vs">vs</div>
      <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
    </div>`).join("");
}
</script>
</body>
</html>
