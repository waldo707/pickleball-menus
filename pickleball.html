<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    padding: 20px;
    background: #f4f4f4;
  }

  h1, h2, h3 {
    text-align: center;
  }

  label {
    display: block;
    margin-top: 12px;
    font-weight: 600;
  }

  textarea, input, button {
    font-size: 18px;
    padding: 10px;
    width: 100%;
    margin-top: 6px;
  }

  textarea {
    -webkit-overflow-scrolling: touch;
  }

  button {
    background: #007acc;
    color: white;
    border: none;
    border-radius: 12px;
    margin-top: 14px;
  }

  .secondary {
    background: #666;
  }

  /* TIMER */
  .timer {
    font-size: 68px;
    font-weight: 800;
    margin: 20px 0;
    text-align: center;
  }

  .timer-running {
    font-size: 82px;
    font-weight: 900;
    margin: 24px 0;
    text-align: center;
  }

  @media (max-width: 420px) {
    .timer {
      font-size: 56px;
    }
    .timer-running {
      font-size: 68px;
    }
  }

  /* MATCH DISPLAY */
  .matchup {
    margin: 24px 0;
    text-align: center;
  }

  .court-label {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    opacity: 0.85;
  }

  .team {
    font-size: 24px;
    font-weight: 600;
  }

  .vs {
    font-size: 18px;
    margin: 6px 0;
    opacity: 0.7;
  }
</style>
</head>

<body>

<!-- ===================== MAIN MENU ===================== -->
<div id="menuView">
  <h1>Pickleball Scheduler</h1>

  <label>Players</label>
  <textarea id="playersInput" rows="3"
    placeholder="Brian, Mike, Sherry, Sue"></textarea>

  <input id="playerActionInput" placeholder="Player name">

  <button onclick="addPlayer()">Add Player</button>
  <button class="secondary" onclick="removePlayer()">Delete Player</button>

  <label>Number of courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

  <button onclick="start()">Generate Schedule</button>
</div>

<!-- ===================== ROUND VIEW ===================== -->
<div id="roundView" style="display:none;">
  <h2 id="roundHeading">Current Round</h2>
  <div id="currentRoundNames"></div>

  <div id="timerDisplay" class="timer">08:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="togglePause()">Pause / Resume</button>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Main Menu</button>
</div>

<!-- ===================== RUNNING VIEW ===================== -->
<div id="runningView" style="display:none;">
  <div id="timerDisplayRunning" class="timer-running">08:00</div>

  <button onclick="togglePause()">Pause / Resume</button>

  <h3 id="nextHeading">Next Round</h3>
  <div id="nextRoundNames"></div>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Main Menu</button>
</div>

<script>
/* ===================== STATE ===================== */

let players=[];
let courts=1;

let timerDurationMinutes=8;
let timerSeconds=480;
let timerInterval=null;
let timerRunning=false;

let currentRound=null;
let nextRoundData=null;
let roundState="idle"; // idle | running | finished

/* ===================== VIEW ===================== */

function setView(v){
  menuView.style.display = v==="menu" ? "block" : "none";
  roundView.style.display = v==="round" ? "block" : "none";
  runningView.style.display = v==="running" ? "block" : "none";
}

/* ===================== AUDIO ===================== */

let audioCtx=null;

function ensureAudioUnlocked(){
  if(!audioCtx){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioCtx();
  }
  if(audioCtx.state==="suspended") audioCtx.resume();
}

function playAlarm(){
  ensureAudioUnlocked();
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=880;
  g.gain.value=0.5;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime+1.2);
}

/* ===================== TIMER ===================== */

function updateTimer(){
  const m=String(Math.floor(timerSeconds/60)).padStart(2,"0");
  const s=String(timerSeconds%60).padStart(2,"0");
  timerDisplay.textContent=m+":"+s;
  timerDisplayRunning.textContent=m+":"+s;
}

function startTimer(){
  if(timerRunning) return;

  // If we just finished a round, promote "Up Now"
  if(roundState==="finished"){
    currentRound = nextRoundData;
    nextRoundData = generateRound();
  }

  ensureAudioUnlocked();
  roundState="running";
  timerRunning=true;
  setView("running");

  timerInterval=setInterval(()=>{
    timerSeconds--;
    updateTimer();
    if(timerSeconds<=0){
      playAlarm();
      endRound();
    }
  },1000);
}

function endRound(){
  clearInterval(timerInterval);
  timerRunning=false;
  roundState="finished";
  timerSeconds=timerDurationMinutes*60;
  render();
  setView("round");
}

function togglePause(){
  if(!timerRunning && timerSeconds>0) return startTimer();
  clearInterval(timerInterval);
  timerRunning=false;
}

/* ===================== PLAYERS ===================== */

function addPlayer(){
  const name=playerActionInput.value.trim();
  if(!name) return;
  let list=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  if(list.some(p=>p.toLowerCase()===name.toLowerCase())){
    alert("Player already exists.");
    return;
  }
  list.push(name);
  playersInput.value=list.join(", ");
  playerActionInput.value="";
}

function removePlayer(){
  const name=playerActionInput.value.trim();
  if(!name){
    alert("Type a player name to remove.");
    return;
  }
  let list=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  const matches=list.filter(p=>p.toLowerCase()===name.toLowerCase());
  if(matches.length===0){
    alert("Name not found.");
    return;
  }
  if(!confirm(`Remove "${matches[0]}"?`)) return;
  playersInput.value=list.filter(p=>p!==matches[0]).join(", ");
  playerActionInput.value="";
}

/* ===================== SCHEDULER ===================== */

function generateRound(){
  let matches=[];
  let pool=[...players].sort(()=>Math.random()-0.5);
  for(let i=0;i<courts;i++){
    if(pool.length<4) break;
    const [a,b,c,d]=pool.splice(0,4);
    matches.push({teamA:[a,b],teamB:[c,d]});
  }
  return {matches};
}

/* ===================== FLOW ===================== */

function start(){
  players=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  courts=parseInt(courtsInput.value,10)||1;
  timerDurationMinutes=parseInt(timerMinutesInput.value,10)||8;

  timerSeconds=timerDurationMinutes*60;
  roundState="idle";

  currentRound=generateRound();
  nextRoundData=generateRound();

  render();
  setView("round");
}

function nextRound(){
  currentRound=nextRoundData;
  nextRoundData=generateRound();
  roundState="idle";
  timerSeconds=timerDurationMinutes*60;
  render();
  setView("round");
}

function goToMenu(){
  if(!confirm("Return to main menu?")) return;
  clearInterval(timerInterval);
  timerRunning=false;
  setView("menu");
}

/* ===================== RENDER ===================== */

function render(){
  roundHeading.textContent =
    roundState==="finished" ? "Up Now" : "Current Round";

  nextHeading.textContent =
    roundState==="running" ? "Next Round" : "Next Round";

  currentRoundNames.innerHTML =
    currentRound.matches.map((m,i)=>`
      <div class="matchup">
        <div class="court-label">Court ${i+1}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>
    `).join("");

  nextRoundNames.innerHTML =
    nextRoundData.matches.map((m,i)=>`
      <div class="matchup">
        <div class="court-label">Court ${i+1}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>
    `).join("");
}
</script>
</body>
</html>
