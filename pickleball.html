<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    padding: 20px;
    background: #f4f4f4;
  }

  h1, h2, h3 {
    text-align: center;
  }

  label {
    display: block;
    margin-top: 12px;
    font-weight: 600;
  }

  textarea, input, button {
    font-size: 18px;
    padding: 10px;
    width: 100%;
    margin-top: 6px;
  }

  textarea {
    -webkit-overflow-scrolling: touch;
  }

  button {
    background: #007acc;
    color: white;
    border: none;
    border-radius: 12px;
    margin-top: 14px;
  }

  .secondary {
    background: #666;
  }

  .timer {
    font-size: 72px;
    font-weight: 800;
    margin: 24px 0;
    text-align: center;
  }

  .timer-running {
    font-size: 88px;
    font-weight: 900;
    margin: 30px 0;
    text-align: center.
  }

  @media (max-width: 420px) {
    .timer {
      font-size: 60px;
    }
    .timer-running {
      font-size: 72px;
    }
  }

  .matchup {
    margin: 24px 0;
    text-align: center;
  }

  .court-label {
    font-size: 20px;
    font-weight: 700;
    opacity: 0.85;
  }

  .team {
    font-size: 24px;
    font-weight: 600;
  }

  .vs {
    font-size: 20px;
    margin: 8px 0;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div id="menuView">
  <h1>Pickleball Scheduler</h1>

  <label>Players</label>
  <textarea id="playersInput" rows="3"></textarea>

  <label>Number of courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

  <button onclick="start()">Generate Schedule</button>
</div>

<div id="roundView" style="display:none;">
  <h2>Current Round</h2>
  <div id="currentRoundNames"></div>

  <div id="timerDisplay" class="timer">08:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="togglePause()">Pause / Resume</button>
  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<div id="runningView" style="display:none;">
  <div id="timerDisplayRunning" class="timer-running">08:00</div>

  <button onclick="togglePause()">Pause / Resume</button>

  <h3>Next Round</h3>
  <div id="nextRoundNames"></div>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<script>
/* ===================== DOM REFERENCES (FIX) ===================== */

const menuView = document.getElementById("menuView");
const roundView = document.getElementById("roundView");
const runningView = document.getElementById("runningView");

const playersInput = document.getElementById("playersInput");
const courtsInput = document.getElementById("courtsInput");
const timerMinutesInput = document.getElementById("timerMinutesInput");

const currentRoundNames = document.getElementById("currentRoundNames");
const nextRoundNames = document.getElementById("nextRoundNames");

const timerDisplay = document.getElementById("timerDisplay");
const timerDisplayRunning = document.getElementById("timerDisplayRunning");

/* ===================== STATE ===================== */

let players = [];
let courts = 1;
let timerDurationMinutes = 8;
let timerSeconds = 480;
let timerInterval = null;
let timerRunning = false;

let currentRound = null;
let nextRoundData = null;

/* ===================== VIEW CONTROL ===================== */

function setView(v) {
  menuView.style.display = v === "menu" ? "block" : "none";
  roundView.style.display = v === "round" ? "block" : "none";
  runningView.style.display = v === "running" ? "block" : "none";
}

/* ===================== TIMER ===================== */

function updateTimer() {
  const m = String(Math.floor(timerSeconds / 60)).padStart(2,"0");
  const s = String(timerSeconds % 60).padStart(2,"0");
  timerDisplay.textContent = m + ":" + s;
  timerDisplayRunning.textContent = m + ":" + s;
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  setView("running");

  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimer();
    if (timerSeconds <= 0) {
      resetTimer();
    }
  }, 1000);
}

function togglePause() {
  if (!timerRunning && timerSeconds > 0) return startTimer();
  clearInterval(timerInterval);
  timerRunning = false;
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = timerDurationMinutes * 60;
  updateTimer();
}

/* ===================== SCHEDULER (still random version) ===================== */

function generateRound() {
  let matches = [];
  let pool = [...players].sort(() => Math.random() - 0.5);

  while (pool.length >= 4) {
    const [a,b,c,d] = pool.splice(0,4);
    matches.push({ teamA:[a,b], teamB:[c,d] });
  }

  return { matches };
}

/* ===================== FLOW ===================== */

function start() {
  players = playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  courts = parseInt(courtsInput.value,10) || 1;
  timerDurationMinutes = parseInt(timerMinutesInput.value,10) || 8;

  resetTimer();
  currentRound = generateRound();
  nextRoundData = generateRound();
  render();
  setView("round");
}

function nextRound() {
  resetTimer();
  currentRound = nextRoundData;
  nextRoundData = generateRound();
  render();
  setView("round");
}

function goToMenu() {
  setView("menu");
}

/* ===================== RENDER ===================== */

function render() {
  currentRoundNames.innerHTML =
    currentRound.matches.map((m,i)=>`
      <div class="matchup">
        <div class="court-label">Court ${i+1}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>
    `).join("");

  nextRoundNames.innerHTML =
    nextRoundData.matches.map((m,i)=>`
      <div class="matchup">
        <div class="court-label">Court ${i+1}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>
    `).join("");
}
</script>
</body>
</html>
