<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  padding: 20px;
  background: #f4f4f4;
}

h1, h2, h3 { text-align: center; }

label {
  display: block;
  margin-top: 12px;
  font-weight: 600;
}

textarea, input, button {
  font-size: 18px;
  padding: 10px;
  width: 100%;
  margin-top: 6px;
}

button {
  background: #007acc;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 14px;
}

.secondary { background:#666; }

/* Timer */
.timer {
  font-size: 64px;
  font-weight: 800;
  text-align: center;
  margin: 20px 0;
}
.timer-running {
  font-size: 72px;
  font-weight: 900;
  text-align: center;
  margin: 26px 0;
}
/* ===== TIMER ALARM BLINK ===== */
.timer-alarm {
  animation: timerBlink 0.6s ease-in-out infinite;
}

@keyframes timerBlink {
  0% {
    color: #ff0000;
    background-color: transparent;
  }
  50% {
    color: #ffffff;
    background-color: #ff0000;
  }
  100% {
    color: #ff0000;
    background-color: transparent;
  }
}

@media (max-width:420px){
  .timer{font-size:52px;}
  .timer-running{font-size:64px;}
}

/* Match display */
.matchup {
  margin: 22px 0;
  text-align: center;
}
.court-label {
  font-size: 18px;
  font-weight: 700;
}
.team {
  font-size: 22px;
  font-weight: 600;
}
.vs {
  font-size: 18px;
  opacity:0.7;
  margin:6px 0;
}
</style>
</head>

<body>

<!-- ===== MAIN MENU ===== -->
<div id="menuView">
  <h1>Pickleball Scheduler</h1>

  <label>Players</label>
<textarea id="playersInput" rows="3"
  placeholder="Brian, Mike, Sherry, Sue"></textarea>

<input id="playerActionInput" placeholder="Type player name">

<button onclick="addPlayer()">Add Player</button>
<button class="secondary" onclick="removePlayer()">Delete Player</button><label>Players</label>

  <label>Courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

  
<button onclick="sessionActive ? resumeSchedule() : start()">
  Resume Schedule
</button>

</div>

<!-- ===== ROUND VIEW ===== -->
<div id="roundView" style="display:none;">
  <h2 id="roundHeading">Current Round</h2>
  <div id="currentRoundNames"></div>

  <div id="timerDisplay" class="timer">00:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="togglePause()">Pause / Resume</button>
  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<!-- ===== RUNNING VIEW ===== -->
<div id="runningView" style="display:none;">
  <div id="timerDisplayRunning" class="timer-running">00:00</div>

  <button onclick="togglePause()">Pause / Resume</button>

  <h3 id="nextHeading">Next Round</h3>
  <div id="nextRoundNames"></div>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<script>

  /* ===================== DOM REFERENCES (FIXED) ===================== */
const menuView = document.getElementById("menuView");
const roundView = document.getElementById("roundView");
const runningView = document.getElementById("runningView");

const playersInput = document.getElementById("playersInput");
const courtsInput = document.getElementById("courtsInput");
const timerMinutesInput = document.getElementById("timerMinutesInput");

const currentRoundNames = document.getElementById("currentRoundNames");
const nextRoundNames = document.getElementById("nextRoundNames");
const roundHeading = document.getElementById("roundHeading");

const timerDisplay = document.getElementById("timerDisplay");
const timerDisplayRunning = document.getElementById("timerDisplayRunning");

/* ===================== STATE ===================== */

let players = [], courts = 1;
let playCount = {}, sitoutStreak = {}, partnerCount = {};

let currentRound = null, nextRoundData = null;
let roundState = "idle";

/* Timer */
let timerMinutes = 8, timerSeconds = 0;
let timerInterval = null, timerRunning = false;

let sessionActive = false;

/* ===================== VIEW ===================== */
function setView(v){
  menuView.style.display = v==="menu" ? "block" : "none";
  roundView.style.display = v==="round" ? "block" : "none";
  runningView.style.display = v==="running" ? "block" : "none";
}


/* ===================== ADD PLAYER ===================== */
function addPlayer() {
  const name = playerActionInput.value.trim();
  if (!name) return;

  const list = playersInput.value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  // Prevent duplicates (case-insensitive)
  if (list.some(p => p.toLowerCase() === name.toLowerCase())) {
    alert("That player is already in the schedule.");
    return;
  }

  // ✅ Update UI list
  list.push(name);
  playersInput.value = list.join(", ");
  playerActionInput.value = "";

  // ✅ If no session is active yet, stop here
  if (!sessionActive) {
    return;
  }

  // ✅ SESSION IS ACTIVE — merge new player into fairness state
  players.push(name);

  const playCounts = Object.values(playCount);
  const minPlayCount =
    playCounts.length > 0 ? Math.min(...playCounts) : 0;

  playCount[name] = minPlayCount;   // catch-up priority
  sitoutStreak[name] = 0;           // fresh sit-out
  partnerCount[name] = {};          // no partner history yet

  console.log(`Player "${name}" added to ongoing session`);
}

/* ===================== REMOVE PLAYER ===================== */
function removePlayer() {
  const name = playerActionInput.value.trim();
  if (!name) {
    alert("Please type a player name to remove.");
    return;
  }

  const list = playersInput.value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  const index = list.findIndex(
    p => p.toLowerCase() === name.toLowerCase()
  );

  if (index === -1) {
    alert("Player not found. Check spelling.");
    return;
  }

  // ✅ Update UI list
  const removed = list.splice(index, 1)[0];
  playersInput.value = list.join(", ");
  playerActionInput.value = "";

  // ✅ If no session active, stop here
  if (!sessionActive) {
    return;
  }

  // ✅ SESSION IS ACTIVE — remove player from scheduler state
  players = players.filter(
    p => p.toLowerCase() !== removed.toLowerCase()
  );

  delete playCount[removed];
  delete sitoutStreak[removed];
  delete partnerCount[removed];

  // ✅ Clean up possible references in upcoming rounds
  if (currentRound) {
    currentRound.matches = currentRound.matches.filter(
      m =>
        !m.teamA.includes(removed) &&
        !m.teamB.includes(removed)
    );
  }

  if (nextRoundData) {
    nextRoundData.matches = nextRoundData.matches.filter(
      m =>
        !m.teamA.includes(removed) &&
        !m.teamB.includes(removed)
    );
  }

  console.log(`Player "${removed}" removed from ongoing session`);
}

/* ===================== AUDIO ===================== */

let audioCtx = null;

function ensureAudioUnlocked() {
  if (!audioCtx) {
    const AudioContextClass =
      window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContextClass();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function playAlarm() {
  ensureAudioUnlocked();

  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 1200; // audible beep
  gain.gain.value = 1.0;

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 1.2);
}


/* ===================== TIMER ===================== */
function updateTimer(){
  const m = String(Math.floor(timerSeconds/60)).padStart(2,"0");
  const s = String(timerSeconds%60).padStart(2,"0");
  timerDisplay.textContent = m+":"+s;
  timerDisplayRunning.textContent = m+":"+s;
}

 function startTimer() {
  if (timerRunning) return;

  // Stop any previous alarm blinking
  timerDisplay.classList.remove("timer-alarm");
  timerDisplayRunning.classList.remove("timer-alarm");

  // Unlock audio on user gesture
  ensureAudioUnlocked();

  if (roundState === "finished") {
    currentRound = nextRoundData;
    nextRoundData = generateRound();
  }

  roundState = "running";
  timerRunning = true;
  setView("running");

  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimer();

    if (timerSeconds <= 0) {
      playAlarm();

      // Start red blinking
      timerDisplay.classList.add("timer-alarm");
      timerDisplayRunning.classList.add("timer-alarm");


      endRound();
    }
  }, 1000);
}

function endRound(){
  clearInterval(timerInterval);
  timerRunning = false;
  roundState = "finished";
  render();
  setView("round");
}

function togglePause(){
  if(!timerRunning && timerSeconds>0){ startTimer(); return; }
  clearInterval(timerInterval);
  timerRunning=false;
}

/* ===================== FAIRNESS SCHEDULER ===================== */
function generateRound() {
  const MAX_SITOUT = 2;
  const slots = courts * 4;

  // Ensure state exists
  players.forEach(p => {
    playCount[p] ??= 0;
    sitoutStreak[p] ??= 0;
    partnerCount[p] ??= {};
  });

  /* --------------------------------------------------
     STEP 1: Force players who sat out too long
     -------------------------------------------------- */
  let forcedPlayers = players
    .filter(p => sitoutStreak[p] >= MAX_SITOUT)
    .sort((a, b) => playCount[a] - playCount[b]);

  if (forcedPlayers.length > slots) {
    forcedPlayers = forcedPlayers.slice(0, slots);
  }

  let playing = [...forcedPlayers];

  /* --------------------------------------------------
     STEP 2: Fill remaining slots fairly
     -------------------------------------------------- */
  const remainingSlots = slots - playing.length;

  if (remainingSlots > 0) {
    let candidates = players
      .filter(p => !playing.includes(p))
      .sort((a, b) => {
        if (playCount[a] !== playCount[b]) {
          return playCount[a] - playCount[b];
        }
        return sitoutStreak[b] - sitoutStreak[a];
      });

    // Controlled randomness buffer
    const buffer = Math.min(
      2,
      Math.max(0, candidates.length - remainingSlots)
    );

    const pool = candidates
      .slice(0, remainingSlots + buffer)
      .sort(() => Math.random() - 0.5);

    playing.push(...pool.slice(0, remainingSlots));
  }

  /* --------------------------------------------------
     STEP 3: Update sit‑out streaks
     -------------------------------------------------- */
  players.forEach(p => {
    if (playing.includes(p)) {
      sitoutStreak[p] = 0;
    } else {
      sitoutStreak[p]++;
    }
  });

  /* --------------------------------------------------
     STEP 4: Pair players (UNCHANGED LOGIC)
     -------------------------------------------------- */
  let matches = [];
  let pool = [...playing];

  while (pool.length >= 4) {
    let bestCombo = null;
    let bestScore = Infinity;

    for (let i = 0; i < pool.length; i++) {
      for (let j = i + 1; j < pool.length; j++) {
        for (let k = 0; k < pool.length; k++) {
          for (let l = k + 1; l < pool.length; l++) {
            const set = new Set([i, j, k, l]);
            if (set.size < 4) continue;

            const a = pool[i], b = pool[j];
            const c = pool[k], d = pool[l];

            const score =
              (partnerCount[a][b] || 0) +
              (partnerCount[c][d] || 0);

            if (score < bestScore) {
              bestScore = score;
              bestCombo = [a, b, c, d];
            }
          }
        }
      }
    }

    const [a, b, c, d] = bestCombo;

    matches.push({ teamA: [a, b], teamB: [c, d] });

    // Commit partner history
    partnerCount[a][b] = (partnerCount[a][b] || 0) + 1;
    partnerCount[b][a] = partnerCount[a][b];
    partnerCount[c][d] = (partnerCount[c][d] || 0) + 1;
    partnerCount[d][c] = partnerCount[c][d];

    // Commit play counts
    playCount[a]++;
    playCount[b]++;
    playCount[c]++;
    playCount[d]++;

    pool = pool.filter(p => ![a, b, c, d].includes(p));
  }

  return { matches };
}
``
/* ===================== FLOW ===================== */
function start() {
  // ✅ FULL RESET — NEW SESSION ONLY

  playCount = {};
  sitoutStreak = {};
  partnerCount = {};

  sessionActive = true;

  // ✅ Timer reset happens ONLY here
  timerSeconds = timerMinutes * 60;

  // ✅ Generate BOTH rounds ONLY here
  currentRound = generateRound();
  nextRoundData = generateRound();

  render();
  setView("round");
}

function resumeSchedule() {
  if (!sessionActive) {
    console.warn("No active session to resume.");
    return;
  }

  // ❌ DO NOT reset timer
  // ❌ DO NOT reset currentRound
  // ✅ ONLY regenerate the UPCOMING round

  nextRoundData = generateRound();

  render();
  setView("round");
}

function nextRound() {
  // ✅ ALWAYS stop the timer
  if (timerInterval) {
    clearInterval(timerInterval);
  }
  timerRunning = false;

  // ✅ Reset timer to user-selected duration
  updateTimer();

  // ✅ Advance the schedule ONLY
  currentRound = nextRoundData;
  nextRoundData = generateRound();

  roundState = "idle";  // not running, not finished

  render();
  setView("round");     // stay on round view
}

function goToMenu(){
  clearInterval(timerInterval);
  timerRunning=false;
  setView("menu");
}

/* ===================== RENDER ===================== */

function render() {
  // ✅ Render CURRENT round only if it exists
  if (currentRound && currentRound.matches) {
    currentRoundNames.innerHTML =
      currentRound.matches.map((m, i) => `
        <div class="matchup">
          <div class="court-label">Court ${i + 1}</div>
          <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
          <div class="vs">vs</div>
          <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
        </div>
      `).join("");
  }

  // ✅ Render NEXT round only if it exists
  if (nextRoundData && nextRoundData.matches) {
    nextRoundNames.innerHTML =
      nextRoundData.matches.map((m, i) => `
        <div class="matchup">
          <div class="court-label">Court ${i + 1}</div>
          <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
          <div class="vs">vs</div>
          <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
        </div>
      `).join("");
  }

</script>
</body>
</html>
