<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    padding: 20px;
    background: #f4f4f4;
  }

  h1, h2, h3 {
    text-align: center;
  }

  label {
    display: block;
    margin-top: 12px;
    font-weight: 600;
  }

  textarea, input, button {
    font-size: 18px;
    padding: 10px;
    width: 100%;
    margin-top: 6px;
  }

  textarea {
    -webkit-overflow-scrolling: touch;
  }

  button {
    background: #007acc;
    color: white;
    border: none;
    border-radius: 12px;
    margin-top: 14px;
  }

  .secondary {
    background: #666;
  }

  /* TIMER */
  .timer {
    font-size: 80px;
    font-weight: 800;
    margin: 26px 0;
    text-align: center;
  }

  .timer-running {
    font-size: 100px;
    font-weight: 900;
    margin: 34px 0;
    text-align: center;
  }

  /* MATCH DISPLAY */
  .matchup {
    margin: 26px 0;
    text-align: center;
  }

  .court-label {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    opacity: 0.85;
  }

  .team {
    font-size: 24px;
    font-weight: 600;
  }

  .vs {
    text-align: center;
    font-size: 20px;
    margin: 8px 0;
    opacity: 0.7;
  }
</style>
</head>

<body>

<!-- ===================== MAIN MENU ===================== -->
<div id="menuView">
  <h1>Pickleball Scheduler</h1>

  <label>Players</label>
  <textarea id="playersInput" rows="3"
    placeholder="Brian, Mike, Sherry, Sue"></textarea>

  <input id="playerActionInput" placeholder="Player name">

  <button onclick="addPlayer()">Add Player</button>
  <button class="secondary" onclick="removePlayer()">Delete Player</button>

  <label>Number of courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

  <button onclick="sessionActive ? updatePlayersAndResume() : start()">
    Generate / Resume Schedule
  </button>
</div>

<!-- ===================== ROUND VIEW ===================== -->
<div id="roundView" style="display:none;">
  <h2>Current Round</h2>
  <div id="currentRoundNames"></div>

  <div class="timer" id="timerDisplay">08:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="togglePause()">Pause / Resume</button>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Main Menu</button>
</div>

<!-- ===================== RUNNING VIEW ===================== -->
<div id="runningView" style="display:none;">
  <div class="timer-running" id="timerDisplayRunning">08:00</div>

  <button onclick="togglePause()">Pause / Resume</button>

  <h3>Next Round</h3>
  <div id="nextRoundNames"></div>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Main Menu</button>
</div>

<script>
/* ===================== STATE ===================== */

let players=[], courts=1;
let playCount={}, sitoutStreak={}, partnerCount={}, lastPartner={}, joinBoost={};
let roundNumber=0, sessionActive=false;

let timerDurationMinutes=8;
let timerSeconds=8*60, timerInterval=null, timerRunning=false;

let currentRound=null, nextRoundData=null;

/* ===================== VIEW CONTROL ===================== */

function setView(v){
  menuView.style.display=v==="menu"?"block":"none";
  roundView.style.display=v==="round"?"block":"none";
  runningView.style.display=v==="running"?"block":"none";
}

/* ===================== PLAYER BUTTONS ===================== */

function addPlayer(){
  const name=playerActionInput.value.trim();
  if(!name) return;

  let list=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  if(list.some(p=>p.toLowerCase()===name.toLowerCase())){
    alert("Player already exists.");
    return;
  }
  list.push(name);
  playersInput.value=list.join(", ");
  playerActionInput.value="";
}

function removePlayer(){
  const name=playerActionInput.value.trim();
  if(!name){
    alert("Please type a player name to delete.");
    return;
  }

  let list=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  const matches=list.filter(p=>p.toLowerCase()===name.toLowerCase());

  if(matches.length===0){
    alert(`"${name}" not found. Check spelling.`);
    return;
  }

  if(!confirm(`Remove "${matches[0]}" from the schedule?`)) return;

  playersInput.value=list.filter(p=>p!==matches[0]).join(", ");
  playerActionInput.value="";
}

/* ===================== TIMER ===================== */

function playAlarm(){
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioCtx();
  if(ctx.state==="suspended") ctx.resume();

  const o=ctx.createOscillator(), g=ctx.createGain();
  o.frequency.value=880;
  g.gain.value=0.5;
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+1.5);
}

function updateTimer(){
  const m=String(Math.floor(timerSeconds/60)).padStart(2,"0");
  const s=String(timerSeconds%60).padStart(2,"0");
  timerDisplay.textContent=m+":"+s;
  timerDisplayRunning.textContent=m+":"+s;
}

function startTimer(){
  if(timerRunning) return;
  playAlarm();   // unlock audio on user gesture
  timerRunning=true;
  setView("running");

  timerInterval=setInterval(()=>{
    timerSeconds--;
    updateTimer();
    if(timerSeconds<=0){
      playAlarm();
      resetTimer();
    }
  },1000);
}

function togglePause(){
  if(!timerRunning && timerSeconds>0) return startTimer();
  clearInterval(timerInterval);
  timerRunning=false;
}

function resetTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  timerSeconds=timerDurationMinutes*60;
  updateTimer();
}

/* ===================== SIMPLE SCHEDULER ===================== */

function generateRound(){
  let matches=[];
  let pool=[...players];
  while(pool.length>=4){
    const [a,b,c,d]=pool.splice(0,4);
    matches.push({teamA:[a,b], teamB:[c,d]});
  }
  return {matches};
}

/* ===================== START / RESUME ===================== */

function start(){
  players=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  courts=parseInt(courtsInput.value,10);
  timerDurationMinutes=parseInt(timerMinutesInput.value,10)||8;
  resetTimer();

  currentRound=generateRound();
  nextRoundData=generateRound();
  render();
  setView("round");
  sessionActive=true;
}

function updatePlayersAndResume(){
  timerDurationMinutes=parseInt(timerMinutesInput.value,10)||8;
  players=playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  resetTimer();
  nextRoundData=generateRound();
  render();
  setView("round");
}

function nextRound(){
  resetTimer();
  currentRound=nextRoundData;
  nextRoundData=generateRound();
  render();
  setView("round");
}

function goToMenu(){
  if(sessionActive && !confirm("Going back to the main menu will end the current schedule. Continue?")) return;
  resetTimer();
  setView("menu");
}

/* ===================== RENDER ===================== */

function render(){
  currentRoundNames.innerHTML=currentRound.matches.map((m,i)=>`
    <div class="matchup">
      <div class="court-label">Court ${i+1}</div>
      <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
      <div class="vs">vs</div>
      <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
    </div>`).join("");

  nextRoundNames.innerHTML=nextRoundData.matches.map((m,i)=>`
    <div class="matchup">
      <div class="court-label">Court ${i+1}</div>
      <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
      <div class="vs">vs</div>
      <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
    </div>`).join("");
}
</script>
</body>
</html>
