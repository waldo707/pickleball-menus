<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  padding: 20px;
  background: #f4f4f4;
}

h1, h2, h3 { text-align: center; }

label {
  display: block;
  margin-top: 12px;
  font-weight: 600;
}

textarea, input, button {
  font-size: 18px;
  padding: 10px;
  width: 100%;
  margin-top: 6px;
}

button {
  background: #007acc;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 14px;
}

.secondary { background:#666; }

/* Timer */
.timer {
  font-size: 64px;
  font-weight: 800;
  text-align: center;
  margin: 20px 0;
}
.timer-running {
  font-size: 72px;
  font-weight: 900;
  text-align: center;
  margin: 26px 0;
}
/* ===== TIMER ALARM BLINK ===== */
.timer-alarm {
  animation: timerBlink 0.6s ease-in-out infinite;
}

@keyframes timerBlink {
  0% {
    color: #ff0000;
    background-color: transparent;
  }
  50% {
    color: #ffffff;
    background-color: #ff0000;
  }
  100% {
    color: #ff0000;
    background-color: transparent;
  }
}

@media (max-width:420px){
  .timer{font-size:52px;}
  .timer-running{font-size:64px;}
}

/* Match display */
.matchup {
  margin: 22px 0;
  text-align: center;
}
.court-label {
  font-size: 18px;
  font-weight: 700;
}
.team {
  font-size: 22px;
  font-weight: 600;
}
.vs {
  font-size: 18px;
  opacity:0.7;
  margin:6px 0;
}
</style>
</head>

<body>

<!-- ✅ GLOBAL TIMER (ALWAYS VISIBLE) -->
  <div id="globalTimer" class="global-timer">
    <span id="timerDisplay">08:00</span>
  </div>


<!-- ===== MAIN MENU ===== -->
<div id="menuView">
  <h1>Pickleball Scheduler</h1>

  <label>Players</label>
<textarea id="playersInput" rows="3"
  placeholder="Brian, Mike, Sherry, Sue"></textarea>

<input id="playerActionInput" placeholder="Type player name">

<button onclick="addPlayer()">Add Player</button>
<button class="secondary" onclick="removePlayer()">Delete Player</button><label>Players</label>

  <label>Courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

 
<button onclick="resumeSchedule()">
  Resume Schedule
</button>

<button class="secondary" onclick="confirmGenerateSchedule()">
  Generate Schedule (Start Over)
</button>

</div>

<!-- ===== ROUND VIEW ===== -->
<div id="roundView" style="display:none;">
  <h2 id="roundHeading">Current Round</h2>
  <div id="currentRoundNames"></div>

  <div id="timerDisplay" class="timer">00:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="togglePause()">Pause / Resume</button>
  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<!-- ===== RUNNING VIEW ===== -->
<div id="runningView" style="display:none;">
  <div id="timerDisplayRunning" class="timer-running">00:00</div>

  <button onclick="togglePause()">Pause / Resume</button>

  <h3 id="nextHeading">Next Round</h3>
  <div id="nextRoundNames"></div>

  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Back to Menu</button>
</div>

<script>

  /* ===================== DOM REFERENCES (FIXED) ===================== */
const menuView = document.getElementById("menuView");
const roundView = document.getElementById("roundView");
const runningView = document.getElementById("runningView");

const playersInput = document.getElementById("playersInput");
const courtsInput = document.getElementById("courtsInput");
const timerMinutesInput = document.getElementById("timerMinutesInput");

const currentRoundNames = document.getElementById("currentRoundNames");
const nextRoundNames = document.getElementById("nextRoundNames");
const roundHeading = document.getElementById("roundHeading");

const timerDisplay = document.getElementById("timerDisplay");
const timerDisplayRunning = document.getElementById("timerDisplayRunning");

/* ===================== STATE ===================== */

let players = [], courts = 1;
let playCount = {}, sitoutStreak = {}, partnerCount = {};

let currentRound = null, nextRoundData = null;
let roundState = "idle";
let sessionActive = false;
let nextRoundLocked = false;
let roundNumber = 1; 

/* Timer */
let timerMinutes = 8, timerSeconds = 0;
let timerInterval = null, timerRunning = false;
let resumeShouldRestartTimer = false;
let roundEndTime = null;


function calculateCourts(playerCount, requestedCourts) {
  const maxCourts = Math.floor(playerCount / 4);
  return Math.max(1, Math.min(requestedCourts, maxCourts));
}


/* ===================== VIEW ===================== */
function setView(v){
  menuView.style.display = v==="menu" ? "block" : "none";
  roundView.style.display = v==="round" ? "block" : "none";
  runningView.style.display = v==="running" ? "block" : "none";
}
/* ===================== ADD PLAYER ===================== */
function addPlayer() {
  const name = playerActionInput.value.trim();
  if (!name) return;

  // Parse players from UI
  const list = playersInput.value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  // Prevent duplicates
  if (list.some(p => p.toLowerCase() === name.toLowerCase())) {
    alert("That player is already in the list.");
    return;
  }

  // ✅ Update UI
  list.push(name);
  playersInput.value = list.join(", ");
  playerActionInput.value = "";

  // ✅ ONLY merge into scheduler if session is active
  if (!sessionActive) return;

  // ✅ CRITICAL: update scheduler player list
  players.push(name);

  // ✅ Initialize fairness state for new player
  const counts = Object.values(playCount);
  const minPlayCount = counts.length ? Math.min(...counts) : 0;

  playCount[name] = minPlayCount - 1;
  sitoutStreak[name] = 0;
  partnerCount[name] = {};

  console.log(`Added "${name}" to active session`);
}

/* ===================== REMOVE PLAYER ===================== */
function removePlayer() {
  const name = playerActionInput.value.trim();
  if (!name) {
    alert("Please type a player name to delete.");
    return;
  }

  // Read current UI player list
  const list = playersInput.value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  // Find case-insensitive match
  const index = list.findIndex(
    p => p.toLowerCase() === name.toLowerCase()
  );

  if (index === -1) {
    alert("Player not found. Check spelling.");
    return;
  }

  const removedName = list[index];

  // ✅ Update UI list
  list.splice(index, 1);
  playersInput.value = list.join(", ");
  playerActionInput.value = "";

  // ✅ If no active session, stop here
  if (!sessionActive) {
    return;
  }

  /* ===================== SESSION ACTIVE ===================== */

  // Warn if player is in current or next round
  const inCurrentRound =
    currentRound &&
    currentRound.matches.some(
      m =>
        m.teamA.includes(removedName) ||
        m.teamB.includes(removedName)
    );

  const inNextRound =
    nextRoundData &&
    nextRoundData.matches.some(
      m =>
        m.teamA.includes(removedName) ||
        m.teamB.includes(removedName)
    );

  if (inCurrentRound || inNextRound) {
    const ok = confirm(
      `${removedName} is currently scheduled to play.\n\n` +
      `Removing them will adjust future rounds but NOT the current game.\n\n` +
      `Do you want to continue?`
    );
    if (!ok) {
      return;
    }
  }

  // ✅ Remove from scheduler player list
  players = players.filter(
    p => p.toLowerCase() !== removedName.toLowerCase()
  );

  // ✅ Remove fairness state ONLY for this player
  delete playCount[removedName];
  delete sitoutStreak[removedName];
  delete partnerCount[removedName];

  console.log(`Player "${removedName}" removed from active session`);
}

/* ===================== AUDIO ===================== */

let audioCtx = null;

function ensureAudioUnlocked() {
  if (!audioCtx) {
    const AudioContextClass =
      window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContextClass();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function playAlarm() {
  ensureAudioUnlocked();

  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 1200; // audible beep
  gain.gain.value = 1.0;

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 1.2);
}


/* ===================== TIMER ===================== */
function updateTimer(){
  const m = String(Math.floor(timerSeconds/60)).padStart(2,"0");
  const s = String(timerSeconds%60).padStart(2,"0");
  timerDisplay.textContent = m+":"+s;
  timerDisplayRunning.textContent = m+":"+s;
}

 function startTimer() {
  if (timerRunning) return;

  // Stop any previous alarm blinking
  timerDisplay.classList.remove("timer-alarm");
  timerDisplayRunning.classList.remove("timer-alarm");

  // Unlock audio on user gesture
  ensureAudioUnlocked();

  // If previous round finished, advance to next
  if (roundState === "finished") {
    currentRound = nextRoundData;
    nextRoundData = generateRound();
  }

  // ✅ Record absolute end time (mobile-safe)
  roundEndTime = Date.now() + timerSeconds * 1000;

  roundState = "running";
  nextRoundLocked = true;
  timerRunning = true;

  setView("running");

  // Update immediately, then every second
  updateTimerFromClock();
  timerInterval = setInterval(updateTimerFromClock, 1000);
}

function updateTimerFromClock() {
  if (!timerRunning || !roundEndTime) return;

  const remainingMs = roundEndTime - Date.now();

  if (remainingMs <= 0) {
    timerSeconds = 0;
    updateTimer();

    playAlarm();

    // Start red blinking alarm
    timerDisplay.classList.add("timer-alarm");
    timerDisplayRunning.classList.add("timer-alarm");

    endRound();
    return;
  }

  timerSeconds = Math.ceil(remainingMs / 1000);
  updateTimer();
}

function endRound(){
  clearInterval(timerInterval);
  timerRunning = false;
  roundState = "finished";
  timerSeconds = timerMinutes * 60;
  render();
  setView("round");
}
/* ✅ OPTIONAL: VISIBILITY SYNC (ADD HERE) */
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && timerRunning) {
    updateTimerFromClock();
  }
});

function togglePause(){
  if(!timerRunning && timerSeconds>0){ startTimer(); return; }
  clearInterval(timerInterval);
  timerRunning=false;
}



/* ===================== FAIRNESS SCHEDULER ===================== */


function partnerRepeatWeight() {
  // Rounds 1–7: almost forbidden
  if (roundNumber <= 7) return 25;

  // Rounds 8–10: strongly discouraged
  if (roundNumber <= 10) return 8;

  // Rounds 11–12: mild discouragement
  if (roundNumber <= 12) return 3;

  // Rounds 13+: normal late-session behavior
  return 1;
}

function balanceWeight() {
  if (roundNumber <= 4) return 10;
  if (roundNumber <= 7) return 8;
  if (roundNumber <= 10) return 5;
  if (roundNumber <= 12) return 3;
  return 1;
}


function generateRound() {
  const MAX_SITOUT = 2;
  const slots = courts * 4;

  // Ensure state exists
  players.forEach(p => {
    playCount[p] ??= 0;
    sitoutStreak[p] ??= 0;
    partnerCount[p] ??= {};
  });

  /* --------------------------------------------------
     STEP 1: Force players who sat out too long
     -------------------------------------------------- */
  let forcedPlayers = players
    .filter(p => sitoutStreak[p] >= MAX_SITOUT)
    .sort((a, b) => playCount[a] - playCount[b]);

  if (forcedPlayers.length > slots) {
    forcedPlayers = forcedPlayers.slice(0, slots);
  }

  let playing = [...forcedPlayers];

  /* --------------------------------------------------
     STEP 2: Fill remaining slots fairly
     -------------------------------------------------- */
  const remainingSlots = slots - playing.length;

  if (remainingSlots > 0) {
    let candidates = players
      .filter(p => !playing.includes(p))
      .sort((a, b) => {
        if (playCount[a] !== playCount[b]) {
          return playCount[a] - playCount[b];
        }
        return sitoutStreak[b] - sitoutStreak[a];
      });

    // Controlled randomness buffer
    const buffer = Math.min(
      2,
      Math.max(0, candidates.length - remainingSlots)
    );

    const pool = candidates
      .slice(0, remainingSlots + buffer)
      .sort(() => Math.random() - 0.5);

    playing.push(...pool.slice(0, remainingSlots));
  }

  /* --------------------------------------------------
     STEP 3: Update sit‑out streaks
     -------------------------------------------------- */
  players.forEach(p => {
    if (playing.includes(p)) {
      sitoutStreak[p] = 0;
    } else {
      sitoutStreak[p]++;
    }
  });

  /* --------------------------------------------------
     STEP 4: Pair players (UNCHANGED LOGIC)
     -------------------------------------------------- */
  let matches = [];
  let pool = [...playing];

  while (pool.length >= 4) {
    let bestCombo = null;
    let bestScore = Infinity;

    for (let i = 0; i < pool.length; i++) {
      for (let j = i + 1; j < pool.length; j++) {
        for (let k = 0; k < pool.length; k++) {
          for (let l = k + 1; l < pool.length; l++) {
            const set = new Set([i, j, k, l]);
            if (set.size < 4) continue;

            const a = pool[i], b = pool[j];
            const c = pool[k], d = pool[l];

            

const pw = partnerRepeatWeight();
const bw = balanceWeight();

// ===== Partner repeat penalty =====
const partnerScore =
  ((partnerCount[a][b] || 0) * pw) +
  ((partnerCount[c][d] || 0) * pw);

// ===== Play-count balance penalty =====
const minCount = Math.min(
  playCount[a],
  playCount[b],
  playCount[c],
  playCount[d]
);

const balanceScore =
  ((playCount[a] - minCount) +
   (playCount[b] - minCount) +
   (playCount[c] - minCount) +
   (playCount[d] - minCount)) * bw;

// ===== Final hybrid score =====
const score = partnerScore + balanceScore;

            if (score < bestScore) {
              bestScore = score;
              bestCombo = [a, b, c, d];
            }
          }
        }
      }
    }

    const [a, b, c, d] = bestCombo;

    matches.push({ teamA: [a, b], teamB: [c, d] });

    // Commit partner history
    partnerCount[a][b] = (partnerCount[a][b] || 0) + 1;
    partnerCount[b][a] = partnerCount[a][b];
    partnerCount[c][d] = (partnerCount[c][d] || 0) + 1;
    partnerCount[d][c] = partnerCount[c][d];

    // Commit play counts
    playCount[a]++;
    playCount[b]++;
    playCount[c]++;
    playCount[d]++;

    pool = pool.filter(p => ![a, b, c, d].includes(p));
  }

  return { matches };
}

/* ===================== FLOW ===================== */
function start(){
  players = playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  
const requestedCourts = parseInt(document.getElementById("courtsInput").value);

courts = calculateCourts(players.length, requestedCourts);

// Optional: reflect the actual value back into the UI
document.getElementById("courtsInput").value = courts;

  timerMinutes = parseInt(timerMinutesInput.value,10)||8;

  playCount={}; sitoutStreak={}; partnerCount={};
  timerSeconds = timerMinutes*60;
  roundState="idle";

  sessionActive = true; 
roundNumber = 1;

  currentRound=generateRound();
  nextRoundData=generateRound();

  render();
  setView("round");
}


function resumeSchedule() {
  if (!sessionActive) {
    alert("No active schedule to resume.");
    return;
  }

  // Only regenerate Next Up if not locked
  if (!nextRoundLocked) {
    nextRoundData = generateRound();
  }

  setView("running");
  render();

  // ✅ Restart timer if it was running before menu
  if (resumeShouldRestartTimer && !timerRunning) {
    startTimer();
  }

  resumeShouldRestartTimer = false;
}
function confirmGenerateSchedule() {
  if (sessionActive) {
    const ok = confirm(
      "This will start the schedule over and erase current game history.\n\nDo you want to continue?"
    );

    if (!ok) {
      return; // user cancelled
    }
  }

  // Intentional reset
  start();
}


function nextRound() {
  // ✅ ALWAYS stop the timer
  if (timerInterval) {
    clearInterval(timerInterval);
  }
  timerRunning = false;

  // ✅ Reset timer to user-selected duration
  timerSeconds = timerMinutes * 60;
  updateTimer();

  // ✅ Advance the schedule ONLY
  currentRound = nextRoundData;
  nextRoundData = generateRound();
roundNumber++;
nextRoundLocked = false; // ✅ unlock for recompute after commit

  roundState = "idle";  // not running, not finished

  render();
  setView("round");     // stay on round view
}


function goToMenu() {
  // Remember whether the timer was running
  resumeShouldRestartTimer = timerRunning;

  setView("menu");
}



/* ===================== RENDER ===================== */
function render(){
  roundHeading.textContent =
    roundState==="finished" ? "Up Now" : "Current Round";

  currentRoundNames.innerHTML =
    currentRound.matches.map((m,i)=>`
      <div class="matchup">
        <div class="court-label">Court ${i+1}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>`).join("");

  nextRoundNames.innerHTML =
    nextRoundData.matches.map((m,i)=>`
      <div class="matchup">
        <div class="court-label">Court ${i+1}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>`).join("");
}
</script>
</body>
</html>
